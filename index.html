<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社デジタルプラス 取締役プレゼンテーション | 不確実性を生き抜くキャリア論</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="筑波大学新卒から一度も転職せずに東証上場企業の取締役へ。激動の13年間、会社の天国と地獄をくぐり抜けた当事者が語る「リアルな生存戦略」。">
  <meta name="author" content="千葉 博文">

  <!-- Google Fonts: Outfit & Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Premium Custom Styling (Elite Luxury Agency Design) -->
  <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body>

  <!-- Living Flowing Background Orbs -->
  <div class="gradient-orb orb-1" aria-hidden="true"></div>
  <div class="gradient-orb orb-2" aria-hidden="true"></div>
  <div class="gradient-orb orb-3" aria-hidden="true"></div>

  <!-- ================= HEADER: BRAND, SEARCH & TIMER ================= -->
  <header class="top-header">
    <div class="brand-badge" id="google-brand-logo" title="クリックで Do a Barrel Roll ! 🌀">
      <div class="pulse-dot" aria-hidden="true"></div>
      <span class="brand-title">DIGITAL PLUS / EXECUTIVE BRIEFING</span>
    </div>
    
    <div style="display: flex; align-items: center; gap: 0.75rem;">
      <!-- Google Presentation Search Trigger -->
      <button id="open-search-btn" class="search-trigger-btn" aria-label="スライド内検索">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>プレゼン内を検索...</span>
        <span class="shortcut-badge">⌘K</span>
      </button>

      <!-- Google "I'm Feeling Lucky" Button -->
      <button id="lucky-btn" class="lucky-btn" title="ランダムなスライドへジャンプ！">
        <span>🎲 手前勝手</span>
      </button>

      <!-- Slide Index Drawer Trigger -->
      <button id="open-drawer-btn" class="index-trigger-btn" aria-label="スライド目次を開く">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
        目次
      </button>

      <!-- Countdown Presentation Timer -->
      <div class="timer-container">
        <span style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; display: none; sm:inline;">TIMER</span>
        <div id="timer-display" class="timer-text">60:00</div>
        
        <div style="display: flex; gap: 0.15rem; border-left: 1px solid var(--border-card); padding-left: 0.35rem;">
          <button id="timer-toggle" class="timer-btn" aria-label="タイマースタート / 一時停止">
            <svg id="timer-play-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg id="timer-pause-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </button>
          
          <button id="timer-reset" class="timer-btn" aria-label="タイマーリセット">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ================= MAIN SLIDER VIEWPORT ================= -->
  <main class="slider-viewport" id="slides-container"></main>

  <!-- ================= BOTTOM NAVIGATION & PROGRESS BAR ================= -->
  <footer class="bottom-bar">
    <!-- Prev Slide -->
    <button id="prev-btn" class="nav-btn" aria-label="前のスライドへ" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    
    <!-- Progress Bar with Interactive Timeline Character -->
    <div style="position: relative; flex: 1; max-width: 480px; margin: 0 1.5rem; height: 50px; display: flex; flex-direction: column; justify-content: flex-end;">
      <!-- Timeline avatar container -->
      <div id="timeline-avatar-container" style="position: absolute; left: 0; bottom: 8px; width: 100%; height: 36px; pointer-events: none;">
        <div id="timeline-avatar" style="position: absolute; left: 10%; bottom: 0; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);">
          <!-- Character Label / Stage -->
          <span id="avatar-label">2013 覚悟の出発</span>
          <!-- Character Graphic -->
          <div id="avatar-graphic" class="man-dignity-badge avatar-floating">👨‍💼</div>
        </div>
      </div>
      <!-- Progress Fill Track -->
      <div class="progress-track" aria-hidden="true" style="margin: 0; max-width: 100%; width: 100%; height: 5px;">
        <div id="progress-fill" class="progress-fill" style="width: 10%;"></div>
      </div>
    </div>
    
    <!-- Next Slide & Counter -->
    <div style="display: flex; align-items: center; gap: 1rem;">
      <span id="current-slide-num" style="font-family: 'Outfit', monospace; font-size: 0.85rem; font-weight: 800; color: var(--text-muted); min-width: 48px; text-align: right;">1 / 10</span>
      <button id="next-btn" class="nav-btn" aria-label="次のスライドへ">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
  </footer>

  <!-- ================= INDEX DRAWER (SIDEBAR OVERLAY) ================= -->
  <div id="index-drawer" class="index-drawer" aria-modal="true" role="dialog" aria-label="目次ナビゲーション">
    <div class="index-drawer-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-card); padding-bottom: 1rem;">
        <h2 style="font-size: 1.15rem; font-weight: 900; letter-spacing: 0.05em; color: var(--text-main);">スライド目次</h2>
        <button id="drawer-close" style="background: none; border: none; color: var(--text-muted); cursor: pointer;" aria-label="目次を閉じる">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <nav id="slide-index-list" aria-label="スライド一覧"></nav>
    </div>
  </div>

  <!-- ================= GLASSMORPHIC ZOOM MODAL ================= -->
  <div id="zoom-modal" class="zoom-modal" aria-modal="true" role="dialog" aria-label="ズーム詳細">
    <div class="zoom-card-body">
      <button id="zoom-close" class="modal-close-btn" aria-label="詳細を閉じる">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div id="zoom-modal-body"></div>
    </div>
  </div>

  <!-- ================= GOOGLE PRESENTATION SEARCH MODAL ================= -->
  <div id="search-modal" class="search-modal" aria-modal="true" role="dialog" aria-label="スライド内検索">
    <div class="search-modal-box">
      <div class="search-input-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-query-input" class="search-input-field" placeholder="キーワードでスライドを検索... (例: M&A, GMV, 裁量権)" autofocus>
        <button id="search-close-btn" style="background: none; border: none; color: var(--text-muted); cursor: pointer;" aria-label="検索を閉じる">ESC</button>
      </div>
      <div id="search-results-list" class="search-results-list"></div>
    </div>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <!-- Slide Content Database -->
  <script src="js/data.js?v=2.0.0"></script>
  <!-- Presentation Logic Engine -->
  <script src="js/app.js?v=2.0.0"></script>
</body>
</html>
